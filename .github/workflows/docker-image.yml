name: Docker Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成版本号
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "VERSION=v$(date +%Y.%m.%d)-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 暂时注释掉登录和推送，只验证构建流程
      # - name: 登录 Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建 Docker 镜像（不推送）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false  # 关键：只构建，不上传
          tags: rabbit8688/xiaohongshu-mcp:${{ steps.version.outputs.VERSION }}
